name: Build and Release APK

on:
  push:
    branches:
      - main
      - master
      - 'trae/**'
    paths:
      - 'textgame/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - master
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: false
        default: ''

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  ANDROID_SDK_TOOLS: '11076708'
  PROJECT_DIR: 'textgame'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
      SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
      SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
    outputs:
      version_name: ${{ steps.get_version.outputs.version_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get tree hash (content fingerprint)
        id: tree
        run: |
          TREE_SHA=$(git rev-parse HEAD^{tree})
          echo "sha=${TREE_SHA}" >> $GITHUB_OUTPUT
          echo "Tree hash: ${TREE_SHA}"

      - name: Restore APK cache by tree hash
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk
          key: apk-${{ steps.tree.outputs.sha }}

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.cache.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: false
          validate-wrappers: false

      - name: Make gradlew executable
        if: steps.cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.PROJECT_DIR }}
        run: chmod +x gradlew

      - name: Setup Android SDK
        if: steps.cache.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: ${{ env.ANDROID_SDK_TOOLS }}
          packages: >
            platforms;android-${{ env.ANDROID_COMPILE_SDK }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS }}
            platform-tools

      - name: Decode signing keystore
        if: env.SIGNING_KEYSTORE_BASE64 != '' && steps.cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > app/release.keystore
          echo "Keystore decoded successfully"

      - name: Get app version
        id: get_version
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "1.0")
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts || echo "1")
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION_NAME} (${VERSION_CODE})"

      - name: Build Debug APK
        if: steps.cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          SIGNING_KEYSTORE_PATH: ${{ env.SIGNING_KEYSTORE_BASE64 != '' && 'release.keystore' || '' }}

      - name: Build Release APK
        if: steps.cache.outputs.cache-hit != 'true'
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        continue-on-error: true
        env:
          SIGNING_KEYSTORE_PATH: ${{ env.SIGNING_KEYSTORE_BASE64 != '' && 'release.keystore' || '' }}

      - name: Report cache hit
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          echo "✅ APK already built for tree ${{ steps.tree.outputs.sha }}, skipping build steps."
          ls -la ${{ env.PROJECT_DIR }}/app/build/outputs/apk/ || true

      - name: Find APK files
        id: find_apk
        run: |
          echo "Looking for APK files..."
          find ${{ env.PROJECT_DIR }} -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          
          DEBUG_APK="${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk"
          RELEASE_APK="${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/app-release.apk"
          RELEASE_UNSIGNED_APK="${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/app-release-unsigned.apk"
          
          if [ -f "$DEBUG_APK" ]; then
            echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
            echo "Found debug APK: $DEBUG_APK"
          fi
          
          if [ -f "$RELEASE_APK" ]; then
            echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT
            echo "Found release APK: $RELEASE_APK"
          elif [ -f "$RELEASE_UNSIGNED_APK" ]; then
            echo "release_apk=$RELEASE_UNSIGNED_APK" >> $GITHUB_OUTPUT
            echo "Found release APK (unsigned): $RELEASE_UNSIGNED_APK"
          fi

      - name: Upload Debug APK artifact
        if: steps.find_apk.outputs.debug_apk
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: ${{ steps.find_apk.outputs.debug_apk }}
          if-no-files-found: error

      - name: Upload Release APK artifact
        if: steps.find_apk.outputs.release_apk
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: ${{ steps.find_apk.outputs.release_apk }}
          if-no-files-found: warn

  release:
    name: Release APK
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug.apk
          path: ./artifacts

      - name: Download Release APK
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: app-release.apk
          path: ./artifacts

      - name: List downloaded artifacts
        run: ls -la ./artifacts/

      - name: Determine release tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event.inputs.release_version }}" != "" ]; then
            TAG_NAME="${{ github.event.inputs.release_version }}"
          else
            TAG_NAME="v${{ needs.build.outputs.version_name }}"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG_NAME"

      - name: Rename APK with version
        run: |
          VERSION="${{ needs.build.outputs.version_name }}"
          mkdir -p release
          
          if [ -f "artifacts/app-debug.apk" ]; then
            cp artifacts/app-debug.apk release/textgame-debug-v${VERSION}.apk
            echo "Prepared: textgame-debug-v${VERSION}.apk"
          fi
          
          if [ -f "artifacts/app-release.apk" ]; then
            cp artifacts/app-release.apk release/textgame-release-v${VERSION}.apk
            echo "Prepared: textgame-release-v${VERSION}.apk"
          fi
          
          ls -la release/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag_name }}
          files: release/*
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
